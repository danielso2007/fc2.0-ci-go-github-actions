name: ci-golang-workflow

on:
  push:
    branches: [ develop ]

  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # 1️⃣ TESTE DA APLICAÇÃO
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Go moderno + cache automático de modules
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      # Executa testes de todos os pacotes
      - name: Run Tests
        run: go test ./... -v -cover


  # =========================
  # 2️⃣ BUILD DA IMAGEM
  # =========================
  docker-build:
    runs-on: ubuntu-latest
    needs: test   # Só executa se o job test passar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Habilita suporte multi-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Habilita BuildKit (Buildx)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build apenas (sem push)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true   # Evita warning e carrega no Docker local
          tags: danielso2007/fc2.0-ci-go:${{ github.sha }}


  # =========================
  # 3️⃣ PUBLICAÇÃO (CD)
  # =========================
  docker-publish:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'   # Só publica em push (não em PR)

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login seguro
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build e push oficial
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            danielso2007/fc2.0-ci-go:latest
            danielso2007/fc2.0-ci-go:${{ github.sha }}